version: '3.8'

services:
  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./GNGM_BE/migrations:/docker-entrypoint-initdb.d
    networks:
      - gngm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gngm_user -d gngm_db"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./GNGM_BE
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./GNGM_BE:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - gngm-network

  frontend:
    build:
      context: ./GNGM_FE
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    volumes:
      - ./GNGM_FE:/app
    depends_on:
      - backend
    networks:
      - gngm-network

networks:
  gngm-network:
    driver: bridge

volumes:
  postgres_data: