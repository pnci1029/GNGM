name: GNGM CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend Tests and Linting
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./GNGM_BE
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ./GNGM_BE/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npm run lint
    
    - name: Run Prettier check
      run: npx prettier --check .
    
    - name: Run tests
      run: npm test

  # Frontend Tests and Analysis  
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./GNGM_FE
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'
        channel: 'stable'
    
    - name: Flutter version
      run: flutter --version
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Run analyzer
      run: flutter analyze
    
    - name: Run tests
      run: flutter test

  # Docker Build Test
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build backend image
      run: |
        cd GNGM_BE
        docker build -f Dockerfile.dev -t gngm-backend:test .
    
    - name: Build frontend image
      run: |
        cd GNGM_FE
        docker build -f Dockerfile.dev -t gngm-frontend:test .
    
    - name: Test docker-compose
      run: |
        docker-compose -f docker-compose.yml config